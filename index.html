<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة العنقود الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --danger: #ef4444;
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0;
        }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        /* الهيدر العلوي */
        .top-bar { background: var(--card); padding: 10px 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; }

        /* شاشة الدخول */
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 90vh; }
        .welcome-frame { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); padding: 20px; border-radius: 30px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border); text-align: center; font-size: 1.2rem; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-bottom: 15px; }
        .btn-clear { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--danger); background: transparent; color: var(--danger); font-weight: bold; cursor: pointer; }

        /* شاشة التطبيق */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: none; }
        .app-card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; font-size: 0.8rem; cursor: pointer; color: var(--text); }
        .nav-item i { display: block; font-size: 1.2rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="nav-header">
        <div id="dateDisplay" style="font-weight: bold;"></div>
        <div style="color: var(--primary); font-weight: 900;">منصة العنقود</div>
        <i class="fas fa-moon" onclick="document.body.classList.toggle('dark-mode')" style="cursor: pointer;"></i>
    </div>
</div>

<div id="loginScreen">
    <div class="welcome-frame">
        <div class="auth-card">
            <h2 style="color: var(--primary); margin-top: 0;">تسجيل الدخول</h2>
            <p style="color: #666; font-size: 0.9rem;">أدخل الرمز للوصول إلى جداولك</p>
            
            <input type="password" id="sysPass" placeholder="الرمز السري">
            
            <button class="btn-main" onclick="handleLogin()">دخول النظام</button>
            
            <button class="btn-clear" onclick="fullReset()">
                <i class="fas fa-trash-alt"></i> مسح الكاش والخروج النهائي
            </button>
        </div>
    </div>
</div>

<div id="mainApp" class="container">
    <div class="app-card">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 20px;">
            <span id="userRoleDisplay" style="font-weight: bold; color: var(--primary);"></span>
            <button onclick="logout()" style="background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold;">تسجيل خروج</button>
        </div>
        
        <div id="contentArea">
            <h3>أهلاً بك في المنصة</h3>
            <p>يتم الآن جلب البيانات من السيرفر...</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()"><i class="fas fa-sync"></i>تحديث</div>
    <div class="nav-item" onclick="fullReset()"><i class="fas fa-power-off"></i>خروج</div>
</div>

<script>
    // وظيفة التحقق من الدخول فور تشغيل الصفحة
    function checkLoginStatus() {
        const loggedIn = localStorage.getItem('isLoggedIn');
        if (loggedIn === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userRoleDisplay').innerText = "البوابة: " + localStorage.getItem('userRole');
        }
    }

    function handleLogin() {
        const pass = document.getElementById('sysPass').value.trim();
        let role = "";

        if (pass === "1") role = "طالب";
        else if (pass === "3294") role = "معلم";
        else if (pass === "1234") role = "إدارة";

        if (role !== "") {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', role);
            location.reload(); // إعادة التحميل لتثبيت الحالة
        } else {
            Swal.fire('خطأ', 'الرمز غير صحيح', 'error');
        }
    }

    function logout() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userRole');
        location.reload();
    }

    // وظيفة مسح الكاش والخروج النهائي
    function fullReset() {
        Swal.fire({
            title: 'هل أنت متأكد؟',
            text: "سيتم مسح كافة البيانات المخزنة وإعادة ضبط المنصة",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'نعم، مسح الكل',
            cancelButtonText: 'إلغاء'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.clear();
                sessionStorage.clear();
                location.reload();
            }
        });
    }

    function updateDateTime() {
        const now = new Date();
        document.getElementById('dateDisplay').innerText = now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
    }

    // تشغيل الفحص بمجرد تحميل الصفحة
    window.onload = () => {
        updateDateTime();
        checkLoginStatus();
    };
</script>

</body>
</html>
